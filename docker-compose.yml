version: "3.8"

services:
  # PostgreSQL Database (internal only — no expose/ports per Coolify rule B2)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contract_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - contract-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend FastAPI Service (internal — reached by frontend via service name)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-contract_db}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: ${DEBUG:-False}
      NLP_MODEL_NAME: ${NLP_MODEL_NAME:-dslim/bert-base-NER}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80,http://frontend}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - nlp_models:/root/.cache/huggingface
    networks:
      - contract-network
    restart: unless-stopped

  # Frontend (nginx) — the ONLY public-facing service. Set the Coolify Domain here.
  # It serves the built SPA and proxies /api -> backend:8000 (see frontend/nginx.conf),
  # so the browser only ever talks to this one origin.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - contract-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  nlp_models:
    driver: local

networks:
  contract-network:
    driver: bridge
